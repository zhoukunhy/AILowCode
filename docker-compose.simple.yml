version: '3.8'

# AI Low-Code Platform 一键部署配置
# 使用方式: docker-compose -f docker-compose.simple.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-lowcode-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ai_lowcode
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - ai-lowcode-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-lowcode-redis
    command: redis-server --appendonly yes --requirepass redis123
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - ai-lowcode-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis123', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Chroma 向量数据库
  chroma:
    image: chromadb/chroma:latest
    container_name: ai-lowcode-chroma
    ports:
      - '8000:8000'
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTHN_PROVIDER=none
    networks:
      - ai-lowcode-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v1/heartbeat']
      interval: 30s
      start_period: 30s
      timeout: 20s
      retries: 3

  nest-server:
    build:
      context: .
      dockerfile: Dockerfile.nest-server
    container_name: ai-lowcode-nest-server
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
      - DB_DATABASE=ai_lowcode
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123
      - JWT_SECRET=ai-lowcode-jwt-secret-change-in-production
      - PORT=3000
      - CHROMA_URL=http://chroma:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    networks:
      - ai-lowcode-network

  canvas-editor:
    build:
      context: .
      dockerfile: Dockerfile.canvas-editor
    container_name: ai-lowcode-canvas-editor
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    ports:
      - '3001:3000'
    depends_on:
      - nest-server
    networks:
      - ai-lowcode-network

  admin-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.admin-dashboard
    container_name: ai-lowcode-admin-dashboard
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3000
    ports:
      - '3002:80'
    depends_on:
      - nest-server
    networks:
      - ai-lowcode-network

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  ai-lowcode-network:
    driver: bridge
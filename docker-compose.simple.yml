version: '3.8'

# AI Low-Code Platform 一键部署配置
# 使用方式: docker-compose -f docker-compose.simple.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-lowcode-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ai_lowcode
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - ai-lowcode-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-lowcode-redis
    command: redis-server --appendonly yes --requirepass redis123
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - ai-lowcode-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis123', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ai-lowcode-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - ai-lowcode-network

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: ai-lowcode-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - ai-lowcode-network

  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: ai-lowcode-milvus
    command: ['milvus', 'run', 'standalone']
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9091/healthz']
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - '19530:19530'
      - '9091:9091'
    depends_on:
      - etcd
      - minio
    networks:
      - ai-lowcode-network

  nest-server:
    build:
      context: .
      dockerfile: Dockerfile.nest-server
    container_name: ai-lowcode-nest-server
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
      - DB_DATABASE=ai_lowcode
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123
      - JWT_SECRET=ai-lowcode-jwt-secret-change-in-production
      - PORT=3000
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - ai-lowcode-network

  canvas-editor:
    build:
      context: .
      dockerfile: Dockerfile.canvas-editor
    container_name: ai-lowcode-canvas-editor
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    ports:
      - '3001:3000'
    depends_on:
      - nest-server
    networks:
      - ai-lowcode-network

  admin-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.admin-dashboard
    container_name: ai-lowcode-admin-dashboard
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3000
    ports:
      - '3002:80'
    depends_on:
      - nest-server
    networks:
      - ai-lowcode-network

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  ai-lowcode-network:
    driver: bridge
